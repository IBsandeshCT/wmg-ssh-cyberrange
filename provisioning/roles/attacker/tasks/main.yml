---
# Prepare the Kali attacker workstation for the SSH brute-force exercise.

- name: Ensure hydra is installed (present by default on Kali, verified here)
  ansible.builtin.apt:
    name: hydra
    state: present
    update_cache: yes

- name: Place the common-password wordlist in kali's home directory
  ansible.builtin.copy:
    src: wordlist.txt
    dest: "/home/{{ attacker_user }}/wordlist.txt"
    owner: "{{ attacker_user }}"
    group: "{{ attacker_user }}"
    mode: '0644'
